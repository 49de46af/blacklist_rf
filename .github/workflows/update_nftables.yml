name: Update nftables config

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  update-nft:
    name: Generate nftables blacklist
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: astral-sh/setup-uv@v4

      - run: uv run python scripts/export_formats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.nft
          git diff --staged --quiet || git commit -m "Update nftables config $(date -u +%Y-%m-%d)"
          git checkout -- .
          git pull --rebase
          git push

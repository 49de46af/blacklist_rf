name: Update blacklists

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  update:
    name: Generate and export blacklists
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: astral-sh/setup-uv@v4

      - run: uv run python scripts/generate_blacklist.py

      - run: uv run python scripts/export_formats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Update blacklists $(date -u +%Y-%m-%d)"
          git push

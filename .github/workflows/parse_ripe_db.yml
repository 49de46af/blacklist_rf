name: Parse RIPE database

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 0'

jobs:
  parse:
    name: Parse RIPE DB
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: astral-sh/setup-uv@v4

      - run: uv run python scripts/parse_ripe_db.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ripe-ru-*
          git diff --staged --quiet || git commit -m "Update RIPE DB data $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
